# Nginx location block — add this inside the tools.gregkiddfornevada.com server block
#
# Streamlit needs WebSocket support for its internal communication,
# so we proxy both HTTP and WS to port 3003.

location /teleprompter {
    proxy_pass http://127.0.0.1:3003/teleprompter;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 86400;
}

location /_stcore {
    proxy_pass http://127.0.0.1:3003/_stcore;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 86400;
}
